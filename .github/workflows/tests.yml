name: Python Data Pipeline Checks

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  test:
    name: Validate Python pipeline code
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Run tests if present
        shell: bash
        run: |
          if [ -d tests ]; then
            python -m pytest -q
          else
            echo "No tests directory yet; running import and syntax checks."
          fi

      - name: Compile source files
        run: python -m compileall -q src
