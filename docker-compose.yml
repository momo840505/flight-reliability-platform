services:
  postgres:
    image: postgres:18
    container_name: flight_reliability_postgres
    environment:
      POSTGRES_DB: flight_reliability
      POSTGRES_USER: flight_admin
      POSTGRES_PASSWORD: flight_password
    ports:
      - "5433:5432"
    volumes:
      - flight_reliability_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flight_admin -d flight_reliability"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  flight_reliability_pgdata:
